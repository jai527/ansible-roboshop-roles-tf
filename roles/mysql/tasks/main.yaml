- name: install mysql
  ansible.builtin.dnf:
    name: mysql-server
    state: present

- name: enable and start mysql
  ansible.builtin.service:
    name: mysqld
    state: restarted
    enabled: yes

- name: install boto3 and botocore
  ansible.builtin.pip:
    name: "{{ item }}"
    executable: pip3.9
  loop:
    - boto3
    - botocore

- name: set the default root password
  ansible.builtin.command: mysql_secure_installation --set-root-pass RoboShop@1